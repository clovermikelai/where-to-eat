<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
<title>該吃啥 · Where To Eat</title>

<!-- PWA -->
<link rel="manifest" href="./manifest.json">
<meta name="theme-color" content="#1a0e0a">
<meta name="application-name" content="Where To Eat">
<link rel="icon" type="image/svg+xml" href="./icon.svg">
<link rel="apple-touch-icon" href="./apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="該吃啥">

<link rel="stylesheet" href="./css/app.css?v=1">
</head>
<body>

<header class="topbar">
  <div class="brand">
    <span class="brand-emoji">🍜</span>
    <div class="brand-text">
      <h1>該吃啥</h1>
      <p class="brand-sub">豐原區美食推薦</p>
    </div>
  </div>
  <div class="topbar-actions">
    <button id="btn-list" class="icon-btn" aria-label="瀏覽清單" title="清單">
      <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><circle cx="3.5" cy="6" r="1.5"/><circle cx="3.5" cy="12" r="1.5"/><circle cx="3.5" cy="18" r="1.5"/></svg>
    </button>
  </div>
</header>

<main class="stage" id="stage">
  <!-- 開場狀態：邀請使用者 -->
  <section class="hero" id="hero" aria-hidden="false">
    <div class="hero-emoji" aria-hidden="true">🍽️</div>
    <h2 class="hero-title">不知道吃什麼？</h2>
    <p class="hero-sub">選擇時段，讓我幫你決定</p>

    <div class="meal-picker" id="meal-picker">
      <button class="meal" data-meal="early-brunch">
        <span class="meal-emoji">🌅</span>
        <span class="meal-label">早餐</span>
      </button>
      <button class="meal" data-meal="lunch">
        <span class="meal-emoji">🍱</span>
        <span class="meal-label">午餐</span>
      </button>
      <button class="meal" data-meal="afternoon">
        <span class="meal-emoji">🍰</span>
        <span class="meal-label">下午茶</span>
      </button>
      <button class="meal" data-meal="dinner">
        <span class="meal-emoji">🍲</span>
        <span class="meal-label">晚餐</span>
      </button>
      <button class="meal" data-meal="midnight">
        <span class="meal-emoji">🌙</span>
        <span class="meal-label">宵夜</span>
      </button>
      <button class="meal" data-meal="any">
        <span class="meal-emoji">🎲</span>
        <span class="meal-label">隨便</span>
      </button>
    </div>
  </section>

  <!-- 結果狀態 -->
  <section class="result" id="result" aria-hidden="true">
    <div class="result-meta">
      <span class="result-meal-tag" id="result-meal-tag">午餐</span>
      <span class="result-counter" id="result-counter">第 1 次</span>
    </div>
    <h2 class="result-name" id="result-name">—</h2>
    <p class="result-type" id="result-type">—</p>
    <p class="result-highlight" id="result-highlight">—</p>
    <div class="result-meta-row">
      <span class="result-price" id="result-price">$</span>
      <span class="result-divider">·</span>
      <span class="result-address" id="result-address">—</span>
    </div>

    <div class="result-actions">
      <button class="btn primary" id="btn-redo">🎲 換一家</button>
      <a class="btn" id="btn-map" target="_blank" rel="noopener">🗺 在 Google 地圖開啟</a>
      <button class="btn ghost" id="btn-back">← 重選時段</button>
    </div>
  </section>

  <!-- 抽選動畫 -->
  <section class="rolling" id="rolling" aria-hidden="true">
    <div class="rolling-emoji" id="rolling-emoji">🍽️</div>
    <p class="rolling-text">挑選中…</p>
  </section>
</main>

<!-- 清單抽屜 -->
<aside id="list-panel" class="panel" aria-hidden="true">
  <div class="panel-head">
    <h2>豐原區美食</h2>
    <button class="icon-btn" id="btn-close-list" aria-label="關閉">✕</button>
  </div>
  <div class="panel-search">
    <input type="search" id="search-input" placeholder="搜尋店名、類型或地址" autocomplete="off">
  </div>
  <div class="panel-body">
    <ul id="list-items" class="list"></ul>
    <p id="list-empty" class="hint" hidden>找不到符合的店家</p>
  </div>
</aside>

<!-- 浮動 Toast -->
<div id="toast" class="toast" aria-live="polite"></div>

<script src="./js/app.js?v=1"></script>
<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js').catch(() => {});
  });
}
</script>
</body>
</html>
